name: Flyway Database Deployment

on:
  push:
    branches:
      - main

jobs:

  # ---------------------------
  # 1. VALIDATION STAGE
  # ---------------------------
  validate:
    name: Validate Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flyway
        run: |
          curl -L https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/10.9.0/flyway-commandline-10.9.0-linux-x64.tar.gz | tar xvz
          sudo ln -s $(pwd)/flyway-10.9.0/flyway /usr/local/bin/flyway

      - name: Validate migrations
        run: flyway validate
        env:
          FLYWAY_URL: ${{ secrets.DB_URL }}
          FLYWAY_USER: ${{ secrets.DB_USER }}
          FLYWAY_PASSWORD: ${{ secrets.DB_PASSWORD }}
          FLYWAY_LOCATIONS: filesystem:migrations

  # ---------------------------
  # 2. STAGING DEPLOYMENT
  # ---------------------------
  staging:
    name: Deploy to Staging
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flyway
        run: |
          curl -L https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/10.9.0/flyway-commandline-10.9.0-linux-x64.tar.gz | tar xvz
          sudo ln -s $(pwd)/flyway-10.9.0/flyway /usr/local/bin/flyway

      - name: Run migrations (staging)
        run: flyway migrate
        env:
          FLYWAY_URL: ${{ secrets.STAGING_DB_URL }}
          FLYWAY_USER: ${{ secrets.STAGING_DB_USER }}
          FLYWAY_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          FLYWAY_LOCATIONS: filesystem:migrations

  # ---------------------------
  # 3. PRODUCTION (MANUAL APPROVAL)
  # ---------------------------
  production:
    name: Deploy to Production
    needs: staging
    runs-on: ubuntu-latest
    environment: production   # 👈 THIS ENABLES MANUAL APPROVAL

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flyway
        run: |
          curl -L https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/10.9.0/flyway-commandline-10.9.0-linux-x64.tar.gz | tar xvz
          sudo ln -s $(pwd)/flyway-10.9.0/flyway /usr/local/bin/flyway

      - name: Deploy to production
        run: flyway migrate
        env:
          FLYWAY_URL: ${{ secrets.PROD_DB_URL }}
          FLYWAY_USER: ${{ secrets.PROD_DB_USER }}
          FLYWAY_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          FLYWAY_LOCATIONS: filesystem:migrations

  # ---------------------------
  # 4. NOTIFICATION STEP
  # ---------------------------
  notify:
    name: Notify Deployment Status
    needs: production
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Print status
        run: echo "Flyway deployment pipeline completed"
